<!DOCTYPE html>
<html>
<head>
    <title>Tactical FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; background: rgba(0,0,0,0.9); padding: 30px; border: 2px solid #0f0; z-index: 10; }
        button { padding: 15px 30px; cursor: pointer; background: #222; color: #0f0; border: 1px solid #0f0; font-weight: bold; }
        #debug-log { position: absolute; bottom: 10px; left: 10px; color: #0f0; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>TACTICAL BREACH</h1>
        <!-- Changed to call window.startGame -->
        <button onclick="window.startGame()">START MISSION</button>
    </div>
    <div id="debug-log">Status: Waiting for input...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com",
                "three/addons/": "https://unpkg.com"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // This makes the function visible to your button
        window.startGame = function() {
            document.getElementById('debug-log').innerText = "Status: Starting Engine...";
            try {
                init();
            } catch (err) {
                alert("CRITICAL ERROR: " + err.message);
            }
        };

        function init() {
            const menu = document.getElementById('menu');
            menu.style.display = 'none';

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);
            
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            camera.position.set(0, 1.6, 5);

            const loader = new GLTFLoader();
            
            // IMPORTANT: Change 'map.glb' to EXACTLY what your file is named on GitHub
            const mapFile = 'map1.glb'; 

            document.getElementById('debug-log').innerText = "Status: Loading Map File...";

            loader.load(mapFile, 
                (gltf) => {
                    scene.add(gltf.scene);
                    document.getElementById('debug-log').innerText = "Status: Map Loaded! Lock mouse to play.";
                    document.body.requestPointerLock();
                },
                (xhr) => {
                    const percent = Math.round((xhr.loaded / xhr.total) * 100);
                    document.getElementById('debug-log').innerText = "Status: Loading Map " + percent + "%";
                },
                (error) => {
                    alert("MAP ERROR: Could not find '" + mapFile + "'. Check your GitHub filenames!");
                }
            );

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
